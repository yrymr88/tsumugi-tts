<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="つむぎ">
<title>つむぎ読み上げ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6f0;
    --surface: #fff9f5;
    --accent: #e8857a;
    --accent2: #f2a97e;
    --text: #3a2a24;
    --muted: #b89890;
    --border: #f0ddd8;
    --shadow: rgba(200, 120, 100, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 背景装飾 */
  body::before {
    content: '';
    position: fixed;
    top: -120px; right: -120px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,133,122,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(242,169,126,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ヘッダー */
  header {
    padding: 20px 20px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 10;
  }

  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 3px 12px var(--shadow);
  }

  .header-text h1 {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.03em;
  }
  .header-text p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .char-count {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    background: var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .char-count.warn { color: var(--accent); background: rgba(232,133,122,0.1); }

  /* メインエリア */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
    overflow: hidden;
  }

  .main-body {
    flex: 1;
    display: flex;
    flex-direction: row;
    gap: 12px;
    overflow: hidden;
    min-height: 0;
  }

  textarea {
    flex: 1;
    width: 0;
    min-width: 0;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    background: var(--surface);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
    -webkit-overflow-scrolling: touch;
  }
  textarea:focus { border-color: var(--accent2); }
  textarea::placeholder { color: #ccc; }

  /* コントロール */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .speed-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .speed-row label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 40px;
  }
  .speed-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 4px;
    background: var(--border);
    outline: none;
  }
  .speed-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 2px 6px var(--shadow);
  }
  .speed-val {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    min-width: 30px;
    text-align: right;
  }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  .btn {
    border: none;
    border-radius: 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.5; pointer-events: none; }

  .btn-play {
    flex: 1;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 4px 16px var(--shadow);
    letter-spacing: 0.05em;
  }
  .btn-play:active { box-shadow: 0 2px 8px var(--shadow); }

  .btn-stop {
    width: 56px; height: 56px;
    background: var(--surface);
    color: var(--accent);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-size: 20px;
    flex-shrink: 0;
  }
  .btn-clear {
    width: 56px; height: 56px;
    background: var(--surface);
    color: var(--muted);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-size: 18px;
    flex-shrink: 0;
  }

  /* ステータス */
  .status-bar {
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    padding: 0 14px;
    transition: all 0.3s;
  }
  .status-bar.active { color: var(--accent); border-color: rgba(232,133,122,0.3); background: rgba(232,133,122,0.05); }
  .status-bar.error { color: #c0392b; border-color: rgba(192,57,43,0.2); background: rgba(192,57,43,0.05); }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* プログレス */
  .progress-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    display: none;
  }
  .progress-wrap.show { display: block; }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.3s;
    width: 0%;
  }

  /* キャラクター */
  .chara-wrap {
    flex: 1;
    min-width: 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    position: relative;
  }
  .chara-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: bottom center;
    position: absolute;
    bottom: 0;
    transition: opacity 0.05s;
    filter: drop-shadow(0 4px 12px rgba(200,120,100,0.2));
    mix-blend-mode: multiply;
  }
  .chara-wrap img.hidden { opacity: 0; }

  /* 波形アニメ */
  .wave {
    display: none;
    align-items: center;
    gap: 3px;
    height: 16px;
  }
  .wave.show { display: flex; }
  .wave span {
    display: block;
    width: 3px;
    border-radius: 3px;
    background: var(--accent);
    animation: wave 0.8s ease-in-out infinite;
  }
  .wave span:nth-child(1) { height: 6px; animation-delay: 0s; }
  .wave span:nth-child(2) { height: 12px; animation-delay: 0.1s; }
  .wave span:nth-child(3) { height: 16px; animation-delay: 0.2s; }
  .wave span:nth-child(4) { height: 10px; animation-delay: 0.3s; }
  .wave span:nth-child(5) { height: 6px; animation-delay: 0.4s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); }
    50% { transform: scaleY(1); }
  }
</style>
</head>
<body>

<header>
  <div class="avatar">🎵</div>
  <div class="header-text">
    <h1>春日部つむぎ</h1>
    <p>読み上げアプリ</p>
  </div>
  <div class="char-count" id="charCount">0文字</div>
</header>

<main>
  <div class="main-body">
    <textarea id="inputText" placeholder="読み上げる文章を貼り付けてください。長文も分割して読み上げます。"></textarea>
    <div class="chara-wrap">
      <img id="imgClose" src="close.png" alt="つむぎ">
      <img id="imgOpen"  src="open.png"  alt="つむぎ" class="hidden">
    </div>
  </div>

  <div class="controls">
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="speed-row">
      <label>はやさ</label>
      <input type="range" id="speedRange" min="0.5" max="2.0" step="0.1" value="1.0">
      <div class="speed-val" id="speedVal">1.0</div>
    </div>

    <div class="status-bar" id="statusBar">
      <span id="statusText">テキストを入力して再生ボタンを押してください</span>
    </div>

    <div class="btn-row">
      <button class="btn btn-play" id="playBtn" onclick="startReading()">
        ▶ 読み上げ開始
      </button>
      <button class="btn btn-stop" id="stopBtn" onclick="stopReading()" title="停止">⏹</button>
      <button class="btn btn-clear" onclick="clearText()" title="クリア">🗑</button>
    </div>
  </div>
</main>

<script>
const SPEAKER_ID = 8; // 春日部つむぎ（ノーマル）
const API_BASE = 'https://api.tts.quest/v3/voicevox/synthesis';
const MAX_CHUNK = 100; // 1チャンクの最大文字数

let audioQueue = [];
let isPlaying = false;
let currentAudio = null;
let isStopped = false;
let audioCtx = null;
let currentSource = null;

// iOS Safari対応: タップ時にAudioContextを初期化
function unlockAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

// ぱくぱく制御
let pakuTimer = null;
let pakuState = false;

function startPaku() {
  if (pakuTimer) return;
  pakuTimer = setInterval(() => {
    pakuState = !pakuState;
    document.getElementById('imgOpen').classList.toggle('hidden', !pakuState);
    document.getElementById('imgClose').classList.toggle('hidden', pakuState);
  }, 280);
}

function stopPaku() {
  if (pakuTimer) { clearInterval(pakuTimer); pakuTimer = null; }
  pakuState = false;
  document.getElementById('imgOpen').classList.add('hidden');
  document.getElementById('imgClose').classList.remove('hidden');
}

// 文字数カウント
const inputText = document.getElementById('inputText');
const charCount = document.getElementById('charCount');
inputText.addEventListener('input', () => {
  const n = inputText.value.length;
  charCount.textContent = `${n}文字`;
  charCount.className = 'char-count' + (n > 5000 ? ' warn' : '');
});

// スピード
const speedRange = document.getElementById('speedRange');
const speedVal = document.getElementById('speedVal');
speedRange.addEventListener('input', () => {
  speedVal.textContent = parseFloat(speedRange.value).toFixed(1);
});

// テキスト分割（句点・改行優先）
function splitText(text) {
  const chunks = [];
  // 句点・！？・改行で分割
  const sentences = text.split(/(?<=[。！？\n])/g).filter(s => s.trim());
  let current = '';
  for (const s of sentences) {
    if ((current + s).length > MAX_CHUNK) {
      if (current) chunks.push(current.trim());
      // 1文がMAX_CHUNKを超える場合は強制分割
      if (s.length > MAX_CHUNK) {
        for (let i = 0; i < s.length; i += MAX_CHUNK) {
          chunks.push(s.slice(i, i + MAX_CHUNK).trim());
        }
        current = '';
      } else {
        current = s;
      }
    } else {
      current += s;
    }
  }
  if (current.trim()) chunks.push(current.trim());
  return chunks.filter(c => c.length > 0);
}

function setStatus(msg, mode = '') {
  const bar = document.getElementById('statusBar');
  const text = document.getElementById('statusText');
  bar.className = 'status-bar' + (mode ? ' ' + mode : '');
  
  // 波形
  let wave = bar.querySelector('.wave');
  let dot = bar.querySelector('.dot');
  
  if (mode === 'active') {
    if (!wave) {
      wave = document.createElement('div');
      wave.className = 'wave show';
      wave.innerHTML = '<span></span><span></span><span></span><span></span><span></span>';
      bar.insertBefore(wave, text);
    } else { wave.className = 'wave show'; }
    if (dot) dot.remove();
  } else if (mode === 'loading') {
    if (!dot) {
      dot = document.createElement('div');
      dot.className = 'dot';
      bar.insertBefore(dot, text);
    }
    if (wave) wave.remove();
  } else {
    if (wave) wave.remove();
    if (dot) dot.remove();
  }
  text.textContent = msg;
}

function setProgress(cur, total) {
  const wrap = document.getElementById('progressWrap');
  const bar = document.getElementById('progressBar');
  if (total === 0) { wrap.className = 'progress-wrap'; return; }
  wrap.className = 'progress-wrap show';
  bar.style.width = `${Math.round((cur / total) * 100)}%`;
}

// mp3URLを取得するまで（合成リクエスト＋ポーリング）
async function fetchMp3Url(text) {
  const params = new URLSearchParams({ speaker: SPEAKER_ID, text });
  const res = await fetch(`${API_BASE}?${params}`);
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  const json = await res.json();
  if (!json.success) throw new Error('合成失敗');

  const statusUrl = json.audioStatusUrl;
  const mp3Url = json.mp3DownloadUrl;
  for (let i = 0; i < 60; i++) {
    if (isStopped) throw new Error('stopped');
    await new Promise(r => setTimeout(r, 500));
    const s = await fetch(statusUrl);
    const sj = await s.json();
    if (sj.isAudioError) throw new Error('合成エラー');
    if (sj.isAudioReady) return mp3Url;
  }
  throw new Error('タイムアウト');
}

// mp3URLからAudioBufferを取得
async function fetchBuffer(mp3Url) {
  const res = await fetch(mp3Url);
  if (!res.ok) throw new Error('音声取得失敗');
  const arrayBuffer = await res.arrayBuffer();
  return new Promise((resolve, reject) => {
    audioCtx.decodeAudioData(arrayBuffer, resolve, reject);
  });
}

// AudioBufferを再生
async function playBuffer(buffer, speed) {
  if (isStopped) throw new Error('stopped');
  return new Promise((resolve) => {
    currentSource = audioCtx.createBufferSource();
    currentSource.buffer = buffer;
    currentSource.playbackRate.value = speed;
    currentSource.connect(audioCtx.destination);
    currentSource.onended = () => { stopPaku(); resolve(); };
    startPaku();
    currentSource.start(0);
  });
}

async function startReading() {
  const text = inputText.value.trim();
  if (!text) { setStatus('テキストを入力してください', 'error'); return; }

  unlockAudio();
  isStopped = false;
  isPlaying = true;
  document.getElementById('playBtn').disabled = true;

  const chunks = splitText(text);
  const speed = parseFloat(speedRange.value);
  setProgress(0, chunks.length);

  try {
    // 最初のチャンクを合成
    setStatus(`合成中… (1/${chunks.length})`, 'loading');
    let currentBufferPromise = fetchMp3Url(chunks[0]).then(url => fetchBuffer(url));

    for (let i = 0; i < chunks.length; i++) {
      if (isStopped) break;

      // 次のチャンクの合成を裏で開始
      let nextBufferPromise = null;
      if (i + 1 < chunks.length) {
        nextBufferPromise = fetchMp3Url(chunks[i + 1]).then(url => fetchBuffer(url));
      }

      // 現在のチャンクのバッファが揃うのを待つ
      const buffer = await currentBufferPromise;
      if (isStopped) break;

      setStatus(`再生中 (${i + 1}/${chunks.length})`, 'active');
      setProgress(i + 1, chunks.length);
      await playBuffer(buffer, speed);

      // 次のバッファを引き継ぐ
      currentBufferPromise = nextBufferPromise;
    }

    if (!isStopped) {
      setStatus('読み上げ完了 ✓');
      setProgress(chunks.length, chunks.length);
    } else {
      setStatus('停止しました');
      setProgress(0, 0);
    }
  } catch (e) {
    if (e.message === 'stopped') {
      setStatus('停止しました');
    } else {
      setStatus('エラーが発生しました: ' + e.message, 'error');
    }
    setProgress(0, 0);
  } finally {
    isPlaying = false;
    document.getElementById('playBtn').disabled = false;
    currentAudio = null;
  }
}

function stopReading() {
  isStopped = true;
  stopPaku();
  if (currentSource) {
    try { currentSource.stop(); } catch(e) {}
    currentSource = null;
  }
}

function clearText() {
  stopReading();
  inputText.value = '';
  charCount.textContent = '0文字';
  charCount.className = 'char-count';
  setStatus('テキストを入力して再生ボタンを押してください');
  setProgress(0, 0);
}
</script>
</body>
</html>
